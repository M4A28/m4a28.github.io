<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>مستخرج الروابط - نسخة محسنة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">أداة استخراج الروابط</h2>
        <input type="url" id="urlInput" placeholder="https://google.com" class="w-full p-3 border rounded-xl mb-4"
            dir="ltr">
        <button onclick="extractLinks()" id="btn"
            class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">استخراج الروابط</button>
        <div id="result" class="mt-6"></div>
    </div>

    <script>
        async function extractLinks() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('result');
            if (!url) return alert("أدخل رابطاً!");

            resDiv.innerHTML = "جاري الاتصال بالموقع...";

            // نستخدم خدمة AllOrigins لجلب المحتوى
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

            try {
                const response = await fetch(proxy);
                const data = await response.json();

                if (!data.contents) throw new Error("لا يمكن الوصول للموقع");

                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const links = Array.from(doc.querySelectorAll('a')).map(a => a.href);
                const uniqueLinks = [...new Set(links)]; // تصفية الروابط المتكررة

                resDiv.innerHTML = `<p>تم العثور على ${uniqueLinks.length} رابط:</p>
                                   <ul class="max-h-60 overflow-y-auto mt-2 text-sm text-blue-600 bg-slate-50 p-3 rounded">
                                   ${uniqueLinks.map(l => `<li>${l}</li>`).join('')}</ul>`;
            } catch (err) {
                resDiv.innerHTML = `<p class="text-red-500">حدث خطأ: ${err.message}. يرجى تجربة رابط آخر.</p>`;
            }
        }
    </script>
</body>

</html>
