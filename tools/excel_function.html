    <style>
        :root {
            --excel-green: #217346;
            --bg-color: #f4f7f6;
            --card-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--excel-green);
            margin-bottom: 5px;
        }

        .stats {
            font-weight: bold;
            color: #666;
            margin-bottom: 20px;
        }

        /* البحث والتصفية */
        .controls {
            max-width: 900px;
            margin: 0 auto 40px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-bar {
            padding: 18px 25px;
            border-radius: 15px;
            border: 2px solid #ddd;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .search-bar:focus {
            border-color: var(--excel-green);
            box-shadow: 0 10px 20px rgba(33, 115, 70, 0.1);
        }

        /* الشبكة */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* البطاقة الاحترافية */
        .func-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .func-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        .name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .func-name {
            font-family: 'Consolas', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--excel-green);
        }

        .category-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: #e8f5e9;
            color: var(--excel-green);
            border-radius: 8px;
            white-space: nowrap;
        }

        .func-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
        }

        /* زر النسخ السريع */
        .copy-btn {
            margin-top: auto;
            padding-top: 15px;
            text-align: left;
        }

        .copy-btn button {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .copy-btn button:hover {
            color: var(--excel-green);
        }
    </style>
</head>

        `).join('');

        function copyName(txt) {
            navigator.clipboard.writeText(txt);

        searchInput.addEventListener('input', (e) => {

            );
            display(filtered);
        });
